version: "3.9"

services:
  flood-das:
    build: .
    container_name: flood_das_api
    ports:
      - "8000:8000"
    environment:
      # Database — SQLite persisted to a named volume
      DATABASE_URL: "sqlite:///./flood_das.db"
      ECHO_SQL: "false"
      # CORS — restrict to your domain in production, e.g. "https://yourdomain.com"
      CORS_ORIGINS: "*"
      PORT: "8000"
    volumes:
      # Persist the SQLite database across container restarts
      - flood_db:/app/flood_das.db
      # Persist OSM buildings cache
      - flood_cache:/app/geojson/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/catchment_info')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  flood_db:
  flood_cache:
